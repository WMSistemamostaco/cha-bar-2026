<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arraiá do Chá Bar — Amanda & Wilian</title>
<meta property="og:title" content="Arraiá do Chá Bar — Amanda & Wilian 🌽"/>
<meta property="og:description" content="11 de julho de 2026 • 18h30 • Ibiporã-PR"/>
<meta property="og:image" content="https://wmsistemamostaco.github.io/cha-bar-2026/capa-convite-chabar.jpeg"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=EB+Garamond:wght@400;500&family=Sour+Gummy:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --primary:#d35400; 
  --secondary:#27ae60; 
  --accent:#f1c40f;
  --bg:#fdf5e6; 
  --text:#2c3e50;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'EB Garamond',serif;color:var(--text);background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');}
.container{max-width:560px;margin:0 auto;padding:2rem 1.25rem 4rem;}

.invite-card{
    background:white;
    border:3px dashed var(--primary);
    border-radius:16px;
    padding:2.5rem 2rem;
    text-align:center;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    margin-bottom:1.5rem;
}
.event-title{font-family:'Sour Gummy', cursive; color:var(--primary); font-size:32px; margin-bottom:10px;}
.names{font-family:'Cormorant Garamond', serif; font-size:28px; font-weight:600; margin-bottom:15px;}

.info-box {
    margin: 1.5rem 0;
    padding: 1rem;
    border-top: 1px solid #eee;
    border-bottom: 1px solid #eee;
}

.mimo-msg {
    margin-top: 1rem;
    font-size: 18px;
    color: var(--secondary);
    font-weight: 600;
    font-family: 'Cormorant Garamond', serif;
}

.form-card{background:white; border-radius:16px; padding:2rem; border:1px solid #ddd; margin-bottom:1.5rem;}
.field{margin-bottom:1.2rem; text-align:left;}
.field label{display:block; font-size:11px; font-weight:bold; text-transform:uppercase; margin-bottom:6px; color:var(--primary);}
.field input, .field select{width:100%; padding:12px; border:1px solid #ccc; border-radius:8px; font-family:inherit; font-size:16px; background:#fafafa;}

.btn-confirm{
    width:100%; padding:16px; background:var(--primary); color:white; 
    border:none; border-radius:8px; font-size:18px; font-weight:bold; cursor:pointer;
}

.painel-btn{width:100%; padding:12px; background:none; border:1px solid #ccc; color:#777; border-radius:8px; cursor:pointer; font-size:13px;}
.painel-overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); color:white; padding:20px; overflow-y:auto; flex-direction:column; z-index:1000;}
.guest-item{background:#222; padding:15px; border-radius:10px; margin-bottom:10px; border-left:4px solid var(--accent);}
</style>
</head>
<body>

<div class="container">
  
  <div class="invite-card">
    <div class="event-title">🔥 Arraiá do Chá Bar</div>
    <div class="names">Amanda & Wilian</div>
    
    <div class="info-box">
        <p><strong>11 de Julho de 2026 às 18h30</strong></p>
        <p>Rua Raul Belone, 160 - Ibiporã/PR</p>
        
        <div class="mimo-msg">🎁 Tragam mimos para os Noivos!</div>
    </div>

    <p style="font-style: italic; color: var(--text);">
        Traga muita alegria, bom humor e o seu traje caipira!
    </p>
  </div>

  <div class="form-card" id="formCard">
    <div class="field">
        <label>Seu Nome Completo</label>
        <input type="text" id="guestName" placeholder="Ex: Maria da Silva"/>
    </div>

    <div class="field">
        <label>Quantas pessoas virão? (Incluindo você)</label>
        <select id="guestCount">
            <option value="1">1 pessoa</option>
            <option value="2">2 pessoas</option>
            <option value="3">3 pessoas</option>
            <option value="4">4 pessoas</option>
            <option value="5">5 ou mais</option>
        </select>
    </div>

    <div class="field">
        <label>O que vai trazer para o nosso arraiá? 🥨</label>
        <select id="foodType">
            <option value="Salgado">Vou levar um Salgado</option>
            <option value="Doce">Vou levar um Doce</option>
            <option value="Os Dois">Levo os dois!</option>
        </select>
    </div>

    <button class="btn-confirm" onclick="confirmar()">Confirmar Presença</button>
  </div>

  <div id="successCard" style="display:none; text-align:center; background:white; border-radius:16px; padding:3rem 2rem;">
    <h2 style="color:var(--secondary);">Presença Confirmada! 🎉</h2>
    <p style="margin-top:1rem;">Prepara o traje que a festa vai ser boa!</p>
  </div>

  <button class="painel-btn" onclick="abrirPainel()">⚙ Painel dos Noivos</button>
</div>

<div id="painelOverlay" class="painel-overlay">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>Lista de Convidados</h2>
        <button onclick="document.getElementById('painelOverlay').style.display='none'" style="background:none; border:none; color:white; font-size:28px;">✕</button>
    </div>
    <div id="listaConvidados"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
emailjs.init('h33oxWzwErwi8kwUF');

const KEY = 'chabar_julino_2026';
const EMAILS = ['mostacowilian28@gmail.com', 'amanda.m_moreira@hotmail.com'];

function confirmar() {
    const nome = document.getElementById('guestName').value;
    const qtd = document.getElementById('guestCount').value;
    const comida = document.getElementById('foodType').value;

    if(!nome) return alert("Por favor, preencha seu nome!");

    const novoConvidado = { nome, qtd, comida, data: new Date().toLocaleString() };
    let lista = JSON.parse(localStorage.getItem(KEY) || '[]');
    lista.unshift(novoConvidado);
    localStorage.setItem(KEY, JSON.stringify(lista));

    EMAILS.forEach(email => {
        emailjs.send('service_5nd34jt', 'template_dcxp758', {
            to_email: email,
            guest_name: nome,
            guest_count: qtd,
            message: `Vai trazer: ${comida}`,
            subject: `🔥 Confirmado no Arraiá: ${nome}`
        });
    });

    document.getElementById('formCard').style.display = 'none';
    document.getElementById('successCard').style.display = 'block';
}

function abrirPainel() {
    const senha = prompt("Senha dos Noivos:");
    if(senha === "amanda2026") {
        document.getElementById('painelOverlay').style.display = 'flex';
        renderizarPainel();
    } else {
        alert("Acesso negado!");
    }
}

function renderizarPainel() {
    const lista = JSON.parse(localStorage.getItem(KEY) || '[]');
    const container = document.getElementById('listaConvidados');
    container.innerHTML = lista.map(c => `
        <div class="guest-item">
            <div><strong>${c.nome}</strong> (${c.qtd} pess.)</div>
            <div style="font-size:13px; color:var(--accent); margin-top:5px;">🥨 Traz: ${c.comida}</div>
        </div>
    `).join('') || "Nenhuma confirmação ainda.";
}
</script>
</body>
</html>
