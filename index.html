<style>
:root{
  --blue:#1B4F72;
  --blue-light:#2E86C1;
  --blue-pale:#D6EAF8;
  --silver:#B0BEC5;
  --silver-light:#ECEFF1;
  --cream:#F4F6F7;
  --dark:#1A252F;

*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);font-family:'EB Garamond',Georgia,serif;color:var(--dark);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 15% 15%,rgba(27,79,114,0.07) 0%,transparent 50%),radial-gradient(circle at 85% 85%,rgba(176,190,197,0.08) 0%,transparent 50%);pointer-events:none;z-index:0;}
.container{max-width:560px;margin:0 auto;padding:2rem 1.25rem 3rem;position:relative;z-index:1;}

.event-badge{text-align:center;margin-bottom:1rem;}
.badge-pill{display:inline-block;background:var(--blue);color:white;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;padding:6px 20px;border-radius:30px;}

.cover-photo{
    width:100%;
    height:auto; 
    border-radius:16px;
    margin-bottom:1.5rem;
    display:block;
    border:2px solid var(--blue-pale);
}

.invite-card{background:white;border:1px solid var(--light);border-top:4px solid var(--blue);border-radius:16px;padding:2.5rem 2rem;text-align:center;margin-bottom:1.5rem;position:relative;overflow:hidden;}
.invite-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(to right,var(--blue),var(--silver),var(--blue));}
.eyelet{display:inline-block;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--mid);margin-bottom:1.25rem;}
.event-type{font-family:'Cormorant Garamond',Georgia,serif;font-size:38px;font-weight:300;color:var(--blue);line-height:1.1;display:block;margin-bottom:0.25rem;}
.names-row{font-family:'Cormorant Garamond',Georgia,serif;font-size:26px;font-weight:400;color:var(--dark);margin-bottom:0.25rem;}
.names-amp{color:var(--blue-light);font-style:italic;}
.divider{display:flex;align-items:center;gap:12px;margin:1.25rem auto;max-width:300px;}
.div-line{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--blue-light),transparent);}
.div-star{color:var(--blue);font-size:12px;}
.details-grid{display:grid;grid-template-columns:1fr 1px 1fr;gap:0;margin-bottom:1.25rem;}
.detail-sep{background:var(--light);}
.detail{padding:0.5rem 1rem;text-align:center;}
.detail-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--mid);margin-bottom:4px;}
.detail-value{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--dark);line-height:1.3;}
.detail-sub{font-size:12px;color:var(--mid);font-style:italic;margin-top:2px;}
.location-block{margin-bottom:1rem;}
.location-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--mid);margin-bottom:6px;}
.location-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--dark);}
.location-sub{font-size:12px;color:var(--mid);font-style:italic;margin-top:2px;}
.btn-maps{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:7px 18px;font-family:'EB Garamond',serif;font-size:13px;letter-spacing:0.08em;background:transparent;border:1px solid var(--blue-light);color:var(--blue-light);border-radius:20px;cursor:pointer;text-decoration:none;transition:background 0.2s,color 0.2s;}
.btn-maps:hover{background:var(--blue-light);color:white;}
.verse{font-size:14px;font
       <div class="form-title">Confirme sua presença</div>
    <div class="field"><label>Seu nome completo</label><input type="text" id="guestName" placeholder="Ex: Maria da Silva" maxlength="80"/></div>
    <div class="field">
      <label>Quantas pessoas virão? (incluindo você)</label>
      <select id="guestCount">
        <option value="1">1 pessoa — só eu</option>
        <option value="2">2 pessoas</option>
        <option value="3">3 pessoas</option>
        <option value="4">4 pessoas</option>
        <option value="5">5 pessoas</option>
        <option value="6">6 pessoas ou mais</option>
      </select>
    </div>
    <button class="btn-confirm" id="confirmBtn" onclick="confirmar()">Confirmar Presença</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <div class="success-card" id="successCard">
    <div class="success-icon">🍻</div>
    <div class="success-title" id="successTitle">Presença confirmada!</div>
    <div class="success-msg" id="successMsg"></div>
  </div>

  <button class="painel-btn" onclick="abrirPainel()">⚙ Painel dos anfitriões</button>

</div>

<div class="painel-overlay" id="painelOverlay" onclick="fecharPainelFora(event)">
  <div class="painel-modal">
    <div class="painel-header">
      <span class="painel-title">Painel dos Anfitriões</span>
      <button class="painel-close" onclick="fecharPainel()">×</button>
    </div>
    <div id="lockScreen" class="lock-screen">
      <span class="lock-label">Acesso restrito</span>
      <input type="password" class="lock-input" id="senhaInput" placeholder="••••••" maxlength="20" onkeydown="if(event.key==='Enter')verificarSenha()"/>
      <button class="btn-entrar" onclick="verificarSenha()">Entrar</button>
      <div class="lock-error" id="lockError"></div>
    </div>
    <div id="painelContent" style="display:none;">
      <div class="stats-row">
        <div class="stat"><span class="stat-num" id="totalConf">0</span><span class="stat-lbl">Confirmados</span></div>
        <div class="stat"><span class="stat-num" id="totalPess">0</span><span class="stat-lbl">Pessoas</span></div>
        <div class="stat"><span class="stat-num" id="totalAgu">100</span><span class="stat-lbl">Aguardando</span></div>
      </div>
      <div class="progress-card">
        <div class="progress-header"><span class="progress-label">Progresso — 100 convidados</span><span class="progress-pct" id="pct">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="pBar" style="width:0%"></div></div>
      </div>
      <div class="guest-card">
        <div class="guest-card-title">Lista de confirmações</div>
        <ul class="guest-list" id="painelList"><li class="empty-msg">Nenhuma confirmação ainda.</li></ul>
      </div>
      <button class="btn-refresh" onclick="atualizarPainel()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Atualizar confirmações
      </button>
      <button class="btn-limpar" onclick="limparDados()">Limpar todos os dados</button>
      <div class="last-update" id="lastUp">—</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
emailjs.init('h33oxWzwErwi8kwUF');
var SERVICE  = 'service_5nd34jt';
var TEMPLATE = 'template_dcxp758';
var EMAIL_TO = 'mostacowilian28@gmail.com';
var SENHA    = 'amanda2026';
var KEY      = 'chabar_aw2026_v1';

function getGuests() {
  try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e) { return []; }
}
function saveGuests(list) {
  try { localStorage.setItem(KEY, JSON.stringify(list)); } catch(e) {}
}

async function confirmar() {
  var name     = document.getElementById('guestName').value.trim();
  var countVal = document.getElementById('guestCount').value;
  if (!name) { document.getElementById('statusMsg').textContent = 'Por favor, informe seu nome completo.'; return; }

  var btn = document.getElementById('confirmBtn');
  btn.disabled = true; btn.textContent = 'Enviando...';
  document.getElementById('statusMsg').textContent = '';

  var now        = new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });
  var countNum   = parseInt(countVal);
  var countLabel = countVal === '6' ? '6 ou mais' : countVal;

  var guests = getGuests();
  guests.unshift({ name: name, count: countNum, countLabel: countLabel, time: now });
  saveGuests(guests);

  var totalPess  = guests.reduce(function(s,g){ return s + (g.count||1); }, 0);
  var listaEmail = guests.map(function(g, i){
    return (i+1) + '. ' + g.name + ' — ' + (g.countLabel||g.count) + ' pessoa(s) — ' + g.time;
  }).join('\n');

  try {
    await emailjs.send(SERVICE, TEMPLATE, {
      to_email:     EMAIL_TO,
      guest_name:   name,
      guest_count:  countLabel,
      confirmed_at: now,
      subject:      '[Cha Bar] Nova confirmacao: ' + name + ' (' + countLabel + ' pessoa(s))',
      message:
        'CHA BAR — AMANDA & WILIAN\n' +
        '11/07/2026 as 18h30 — Rua Raul Belone 160, Ibipora-PR\n\n' +
        'NOVA CONFIRMACAO:\n' +
        'Nome: ' + name + '\n' +
        'Pessoas: ' + countLabel + '\n' +
        'Horario: ' + now + '\n\n' +
        '----------------------------\n' +
        'LISTA COMPLETA (' + guests.length + ' confirmado(s) / ' + totalPess + ' pessoa(s)):\n\n' +
        listaEmail + '\n\n' +
        '----------------------------\n' +
        'Cha Bar Amanda & Wilian — 11/07/2026'
    });
  } catch(e) { console.error('EmailJS:', e); }

  document.getElementById('formCard').style.display = 'none';
  document.getElementById('successCard').style.display = 'block';
  document.getElementById('successTitle').textContent = 'Obrigado, ' + name.split(' ')[0] + '!';
  document.getElementById('successMsg').innerHTML =
    'Presenca confirmada para <strong>' + countLabel + ' pessoa' + (countNum > 1 ? 's' : '') + '</strong>.<br>Nos vemos no Cha Bar! 🍻🎉';
}

function abrirPainel() {
  document.getElementById('painelOverlay').classList.add('active');
  document.getElementById('senhaInput').value = '';
  document.getElementById('lockError').textContent = '';
  document.getElementById('lockScreen').style.display = 'block';
  document.getElementById('painelContent').style.display = 'none';
  setTimeout(function(){ document.getElementById('senhaInput').focus(); }, 100);
}
function fecharPainel() { document.getElementById('painelOverlay').classList.remove('active'); }
function fecharPainelFora(e) { if (e.target === document.getElementById('painelOverlay')) fecharPainel(); }

function verificarSenha() {
  if (document.getElementById('senhaInput').value === SENHA) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('painelContent').style.display = 'block';
    atualizarPainel();
  } else {
    document.getElementById('lockError').textContent = 'Senha incorreta. Tente novamente.';
  }
}

function atualizarPainel() {
  var guests    = getGuests();
  var totalConf = guests.length;
  var totalPess = guests.reduce(function(s,g){ return s + (g.count||1); }, 0);
  var aguardando= Math.max(0, 100 - totalConf);
  var pct        = Math.min(100, Math.round((totalConf / 100) * 100));

  document.getElementById('totalConf').textContent = totalConf;
  document.getElementById('totalPess').textContent = totalPess;
  document.getElementById('totalAgu').textContent  = aguardando;
  document.getElementById('pct').textContent       = pct + '%';
  document.getElementById('pBar').style.width      = pct + '%';

  var ul = document.getElementById('painelList');
  ul.innerHTML = '';
  if (guests.length === 0) {
    ul.innerHTML = '<li class="empty-msg">Nenhuma confirmacao ainda.</li>';
  } else {
    guests.forEach(function(g) {
      var li = document.createElement('li');
      li.className = 'guest-item';
      li.innerHTML =
        '<span class="guest-name">' + g.name + '</span>' +
        '<span class="guest-badge">' + (g.countLabel||g.count) + ' pessoa(s)</span>' +
        '<span class="guest-time">' + (g.time ? g.time.split(',')[0] : '') + '</span>';
      ul.appendChild(li);
    });
  }
  document.getElementById('lastUp').textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
}

function limparDados() {
  var senha = prompt('Digite a senha para apagar os dados:');
  if (senha === null) return;
  if (senha !== SENHA) { alert('Senha incorreta! Os dados nao foram apagados.'); return; }
  if (!confirm('Tem certeza? Esta acao apagara TODAS as confirmacoes!')) return;
  saveGuests([]);
  atualizarPainel();
  alert('Dados apagados com sucesso.');
}
</script>
</body>
