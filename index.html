<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chá Bar — Amanda & Wilian</title>
<style>
:root{ --primary:#1a4a6e; --bg:#f8f9fa; --text:#333; }
*{box-sizing:border-box; margin:0; padding:0;}
body{ background:var(--bg); font-family:'Helvetica Neue', Arial, sans-serif; color:var(--text); line-height:1.6; }
.container{ max-width:500px; margin:0 auto; padding:2rem 1rem; }
.card{ background:white; border-radius:12px; padding:2rem; box-shadow:0 4px 15px rgba(0,0,0,0.05); text-align:center; margin-bottom:1.5rem; }
.names{ font-size:24px; font-weight:bold; margin-bottom:1rem; color:var(--primary); }
.info-box{ margin:1.5rem 0; padding:1rem; border-top:1px solid #eee; border-bottom:1px solid #eee; }
.mimo-msg{ margin-top:10px; color:#28a745; font-weight:bold; font-size:16px; }
.field{ margin-bottom:1.2rem; text-align:left; }
.field label{ display:block; font-size:12px; font-weight:bold; margin-bottom:5px; color:#666; text-transform:uppercase; }
.field input, .field select{ width:100%; padding:12px; border:1px solid #ddd; border-radius:6px; font-size:16px; }
.btn-confirm{ width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:6px; font-size:18px; font-weight:bold; cursor:pointer; }
.painel-btn{ background:none; border:none; color:#aaa; font-size:12px; cursor:pointer; width:100%; margin-top:10px; }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <div style="font-size:14px; text-transform:uppercase; letter-spacing:2px; color:#888;">Chá Bar</div>
    <div class="names">Amanda & Wilian</div>
    
    <div class="info-box">
        <p><strong>11 de Julho de 2026 às 18h30</strong></p>
        <p>Rua Raul Belone, 160 - Ibiporã/PR</p>
        <p class="mimo-msg">🎁 Tragam mimos para os Noivos!</p>
    </div>

    <p style="font-size:14px; color:#666;">Vem comemorar esse momento especial com a gente!<br>Traga muita alegria e bom humor!</p>
  </div>

  <div class="card" id="formCard">
    <div class="field">
        <label>Seu Nome Completo</label>
        <input type="text" id="guestName" placeholder="Ex: Maria da Silva">
    </div>
    <div class="field">
        <label>Quantas pessoas virão?</label>
        <select id="guestCount">
            <option value="1">1 pessoa</option>
            <option value="2">2 pessoas</option>
            <option value="3">3 pessoas</option>
            <option value="4">4 pessoas</option>
        </select>
    </div>
    <div class="field">
        <label>O que vai trazer para comer?</label>
        <select id="foodType">
            <option value="Salgado">Vou levar um Salgado</option>
            <option value="Doce">Vou levar um Doce</option>
            <option value="Os Dois">Levo os dois!</option>
        </select>
    </div>
    <button class="btn-confirm" onclick="confirmar()">Confirmar Presença</button>
  </div>

  <div class="card" id="successCard" style="display:none;">
    <h2 style="color:#28a745;">Presença Confirmada! 🎉</h2>
    <p>Mal podemos esperar para te ver lá!</p>
  </div>

  <button class="painel-btn" onclick="abrirPainel()">⚙ Painel dos Noivos</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
emailjs.init('h33oxWzwErwi8kwUF');

const KEY = 'chabar_2026_oficial';
const EMAILS = ['mostacowilian28@gmail.com', 'amanda.m_moreira@hotmail.com'];

function confirmar() {
    const nome = document.getElementById('guestName').value;
    const qtd = document.getElementById('guestCount').value;
    const comida = document.getElementById('foodType').value;

    if(!nome) return alert("Por favor, preencha seu nome!");

    const novo = { nome, qtd, comida, data: new Date().toLocaleString() };
    let lista = JSON.parse(localStorage.getItem(KEY) || '[]');
    lista.unshift(novo);
    localStorage.setItem(KEY, JSON.stringify(lista));

    EMAILS.forEach(email => {
        emailjs.send('service_5nd34jt', 'template_dcxp758', {
            to_email: email,
            guest_name: nome,
            guest_count: qtd,
            message: `Traz: ${comida}`,
            subject: `Confirmação Chá Bar: ${nome}`
        });
    });

    document.getElementById('formCard').style.display = 'none';
    document.getElementById('successCard').style.display = 'block';
}

function abrirPainel() {
    if(prompt("Senha dos Noivos:") === "amanda2026") {
        const lista = JSON.parse(localStorage.getItem(KEY) || '[]');
        alert("Lista de Convidados:\n\n" + lista.map(c => `${c.nome} (${c.qtd} pess.) - ${c.comida}`).join('\n'));
    }
}
</script>
</body>
</html>
